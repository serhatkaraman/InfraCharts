jenkins:
  controller:
    installLatestPlugins: true
    nodeSelector:
      kubernetes.io/hostname: node-2
    jenkinsUrl: "https://jenkins.myturkishdish.com"
    ingress:
      enabled: true
      ingressClassName: nginx
      hostName: jenkins.myturkishdish.com
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
        external-dns.alpha.kubernetes.io/hostname: jenkins.myturkishdish.com
      tls:
        - secretName: jenkins-tls
          hosts:
            - jenkins.myturkishdish.com
    additionalPlugins:
      - job-dsl
      - generic-webhook-trigger

    containerEnv:
      - name: GIT_USERNAME
        valueFrom:
          secretKeyRef:
            name: jenkins-git
            key: username
      - name: GIT_TOKEN
        valueFrom:
          secretKeyRef:
            name: jenkins-git
            key: token
      - name: WEBHOOK_TOKEN
        valueFrom:
          secretKeyRef:
            name: jenkins-git
            key: webhook-token

    JCasC:
      defaultConfig: true
      configScripts:
        job-dsl-security: |
          security:
            globalJobDslSecurityConfiguration:
              useScriptSecurity: false
        credentials: |
          credentials:
            system:
              domainCredentials:
                - credentials:
                    - usernamePassword:
                        scope: GLOBAL
                        id: git-credentials
                        username: ${GIT_USERNAME}
                        password: ${GIT_TOKEN}
                    - string:
                        scope: GLOBAL
                        id: webhook-token
                        secret: ${WEBHOOK_TOKEN}
        seed-job: |
          jobs:
            - script: |
                pipelineJob('app-ci') {
                  definition {
                    cps {
                      sandbox(true)
                      script(new File('/var/jenkins_config/pipeline/Jenkinsfile').text)
                    }
                  }
                }
            - script: |
                pipelineJob('app-cd') {
                  definition {
                    cps {
                      sandbox(true)
                      script(new File('/var/jenkins_config/pipeline/DeployJenkinsfile').text)
                    }
                  }
                }

  persistence:
    enabled: true
    storageClass: local-path
    size: 8Gi
    volumes:
      - name: pipeline
        configMap:
          name: jenkins-pipeline
    mounts:
      - name: pipeline
        mountPath: /var/jenkins_config/pipeline
        readOnly: true

  agent:
    enabled: true

pipeline:
  # REGISTRY/IMAGE buradan düzenlenir; imaj tag'i: <branch|tag>-<commit6>
  jenkinsfile: |
    pipeline {
      agent {
        kubernetes {
          defaultContainer 'jnlp'
          yaml """
    apiVersion: v1
    kind: Pod
    spec:
      containers:
        - name: kaniko
          image: gcr.io/kaniko-project/executor:debug
          command: ['sleep']
          args: ['99d']
          volumeMounts:
            - name: docker-config
              mountPath: /kaniko/.docker
        - name: tools
          image: alpine:3.20
          command: ['sleep']
          args: ['99d']
      volumes:
        - name: docker-config
          secret:
            secretName: jenkins-registry
            items:
              - key: .dockerconfigjson
                path: config.json
    """
        }
      }

      options {
        disableConcurrentBuilds()
      }

      environment {
        REGISTRY       = 'docker.io'
        IMAGE          = 'serhatkaraman/javaapp'
        APP_REPO       = 'https://github.com/serhatkaraman/JavaApp.git'
        APP_BRANCH     = 'master'
        DEPLOY_ENV     = 'dev'
        APPCHARTS_REPO = 'github.com/serhatkaraman/AppCharts'
        APPCHARTS_FILE = 'JavaApp/values.yaml'
      }

      triggers {
        pollSCM('H/2 * * * *')
      }

      stages {
        stage('Checkout') {
          steps {
            checkout([$class: 'GitSCM',
              branches: [[name: '*/' + env.APP_BRANCH]],
              userRemoteConfigs: [[url: env.APP_REPO, credentialsId: 'git-credentials']]
            ])
            script {
              env.COMMIT6 = sh(script: 'git rev-parse --short=6 HEAD', returnStdout: true).trim()
              env.IMAGE_TAG = env.APP_BRANCH + '-' + env.COMMIT6
              echo "Building ${env.REGISTRY}/${env.IMAGE}:${env.IMAGE_TAG}"
            }
          }
        }

        stage('Build & Push') {
          steps {
            container('kaniko') {
              sh '''
                /kaniko/executor \
                  --context ${WORKSPACE} \
                  --dockerfile ${WORKSPACE}/Dockerfile \
                  --destination ${REGISTRY}/${IMAGE}:${IMAGE_TAG} \
                  --destination ${REGISTRY}/${IMAGE}:${DEPLOY_ENV}
              '''
            }
          }
        }

        stage('Promote dev') {
          steps {
            container('tools') {
              withCredentials([usernamePassword(credentialsId: 'git-credentials', usernameVariable: 'GH_USER', passwordVariable: 'GH_TOKEN')]) {
                sh '''
                  apk add --no-cache git yq >/dev/null
                  git config --global user.email "jenkins@dreamgames-case"
                  git config --global user.name "jenkins-ci"
                  rm -rf appcharts
                  git clone https://${GH_USER}:${GH_TOKEN}@${APPCHARTS_REPO}.git appcharts
                  cd appcharts
                  yq -i '.image.tag = strenv(IMAGE_TAG)' ${APPCHARTS_FILE}
                  git commit -am "ci(javaapp): dev image ${IMAGE_TAG}" || echo "no change"
                  git push origin HEAD:master
                '''
              }
            }
          }
        }
      }
    }

  deployJenkinsfile: |
    pipeline {
      agent {
        kubernetes {
          defaultContainer 'ansible'
          yaml """
    apiVersion: v1
    kind: Pod
    spec:
      serviceAccountName: jenkins-deployer
      containers:
        - name: ansible
          image: python:3.11-slim
          command: ['sleep']
          args: ['99d']
    """
        }
      }

      options {
        disableConcurrentBuilds()
      }

      parameters {
        string(name: 'IMAGE_TAG', defaultValue: 'master-4c6208', description: 'NewJavaApp image tag')
        string(name: 'NAMESPACE', defaultValue: 'newjavaapp', description: 'Target namespace')
      }

      environment {
        APPCHARTS_REPO = 'https://github.com/serhatkaraman/AppCharts.git'
        CHART_DIR      = 'NewJavaApp'
        RELEASE        = 'newjavaapp'
      }

      stages {
        stage('Checkout') {
          steps {
            checkout([$class: 'GitSCM',
              branches: [[name: '*/master']],
              userRemoteConfigs: [[url: env.APPCHARTS_REPO, credentialsId: 'git-credentials']]
            ])
          }
        }

        stage('Setup') {
          steps {
            sh '''
              set -e
              apt-get update -qq && apt-get install -y -qq curl ca-certificates >/dev/null
              pip install --quiet --root-user-action=ignore ansible kubernetes
              ansible-galaxy collection install kubernetes.core >/dev/null
              ARCH=$(uname -m); case "$ARCH" in aarch64|arm64) H=arm64;; *) H=amd64;; esac
              curl -sfL https://get.helm.sh/helm-v3.16.3-linux-$H.tar.gz | tar xz -C /tmp
              install /tmp/linux-$H/helm /usr/local/bin/helm
            '''
          }
        }

        stage('Deploy (Ansible)') {
          steps {
            sh '''
              set -e
              ansible-playbook ${CHART_DIR}/deploy.yml -e release=${RELEASE} -e chart_dir=${CHART_DIR} -e target_ns=${NAMESPACE} -e image_tag=${IMAGE_TAG}
            '''
          }
        }
      }
    }

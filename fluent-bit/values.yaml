logs:
  kind: DaemonSet
  tolerations:
    - operator: Exists
  env:
    - name: ES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: dreamgames-es-es-elastic-user
          key: elastic
  extraVolumes:
    - name: flb-storage
      emptyDir: {}
  extraVolumeMounts:
    - name: flb-storage
      mountPath: /var/flb-storage
  config:
    service: |
      [SERVICE]
          Daemon Off
          Flush 5
          Log_Level info
          Parsers_File /fluent-bit/etc/parsers.conf
          HTTP_Server On
          HTTP_Listen 0.0.0.0
          HTTP_Port 2020
          Health_Check On
          storage.type filesystem
          storage.path /var/flb-storage/
          storage.sync normal
          storage.checksum off
          storage.max_chunks_up 128
          storage.backlog.mem_limit 128M
    inputs: |
      [INPUT]
          Name tail
          Path /var/log/containers/*.log
          multiline.parser docker, cri
          Tag kube.*
          Mem_Buf_Limit 100MB
          storage.type filesystem
          Skip_Long_Lines On
    filters: |
      [FILTER]
          Name kubernetes
          Match kube.*
          Merge_Log On
          Keep_Log Off
          K8S-Logging.Parser On
          K8S-Logging.Exclude On
    outputs: |
      [OUTPUT]
          Name es
          Match kube.*
          Host dreamgames-es-es-http.elasticsearch.svc.cluster.local
          Port 9200
          tls On
          tls.verify Off
          HTTP_User elastic
          HTTP_Passwd ${ES_PASSWORD}
          Logstash_Format On
          Logstash_Prefix kube
          Suppress_Type_Name On
          Replace_Dots On
          storage.total_limit_size 5G
          Retry_Limit False

events:
  kind: Deployment
  replicaCount: 1
  rbac:
    create: true
    eventsAccess: true
  env:
    - name: ES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: dreamgames-es-es-elastic-user
          key: elastic
  extraVolumes:
    - name: flb-storage
      emptyDir: {}
  extraVolumeMounts:
    - name: flb-storage
      mountPath: /var/flb-storage
  config:
    service: |
      [SERVICE]
          Daemon Off
          Flush 5
          Log_Level info
          HTTP_Server On
          HTTP_Listen 0.0.0.0
          HTTP_Port 2020
          Health_Check On
          storage.type filesystem
          storage.path /var/flb-storage/
          storage.sync normal
          storage.checksum off
          storage.backlog.mem_limit 64M
    inputs: |
      [INPUT]
          Name kubernetes_events
          Tag k8s_events
          Kube_URL https://kubernetes.default.svc
          storage.type filesystem
    filters: ""
    outputs: |
      [OUTPUT]
          Name es
          Match k8s_events
          Host dreamgames-es-es-http.elasticsearch.svc.cluster.local
          Port 9200
          tls On
          tls.verify Off
          HTTP_User elastic
          HTTP_Passwd ${ES_PASSWORD}
          Logstash_Format On
          Logstash_Prefix k8s-events
          Suppress_Type_Name On
          Replace_Dots On
          storage.total_limit_size 2G
          Retry_Limit False

aggregator:
  kind: Deployment
  replicaCount: 1
  extraPorts:
    - port: 24224
      containerPort: 24224
      protocol: TCP
      name: forward
  env:
    - name: ES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: dreamgames-es-es-elastic-user
          key: elastic
  extraVolumes:
    - name: flb-storage
      emptyDir: {}
  extraVolumeMounts:
    - name: flb-storage
      mountPath: /var/flb-storage
  config:
    service: |
      [SERVICE]
          Daemon Off
          Flush 5
          Log_Level info
          HTTP_Server On
          HTTP_Listen 0.0.0.0
          HTTP_Port 2020
          Health_Check On
          storage.type filesystem
          storage.path /var/flb-storage/
          storage.sync normal
          storage.checksum off
          storage.backlog.mem_limit 128M
    inputs: |
      [INPUT]
          Name forward
          Listen 0.0.0.0
          Port 24224
          storage.type filesystem
    filters: ""
    outputs: |
      [OUTPUT]
          Name es
          Match app.*
          Host dreamgames-es-es-http.elasticsearch.svc.cluster.local
          Port 9200
          tls On
          tls.verify Off
          HTTP_User elastic
          HTTP_Passwd ${ES_PASSWORD}
          Index logs-app-default
          Suppress_Type_Name On
          Write_Operation create
          Replace_Dots On
          storage.total_limit_size 5G
          Retry_Limit False

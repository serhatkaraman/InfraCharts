logs:
  kind: DaemonSet
  tolerations:
    - operator: Exists
  config:
    service: |
      [SERVICE]
          Daemon Off
          Flush 5
          Log_Level info
          Parsers_File /fluent-bit/etc/parsers.conf
          HTTP_Server On
          HTTP_Listen 0.0.0.0
          HTTP_Port 2020
          Health_Check On
    inputs: |
      [INPUT]
          Name tail
          Path /var/log/containers/*.log
          multiline.parser docker, cri
          Tag kube.*
          Mem_Buf_Limit 50MB
          Skip_Long_Lines On
    filters: |
      [FILTER]
          Name kubernetes
          Match kube.*
          Merge_Log On
          Keep_Log Off
          K8S-Logging.Parser On
          K8S-Logging.Exclude On
    outputs: |
      [OUTPUT]
          Name es
          Match kube.*
          Host dreamgames-es-master.elasticsearch.svc.cluster.local
          Port 9200
          Logstash_Format On
          Logstash_Prefix kube
          Suppress_Type_Name On
          Replace_Dots On
          Retry_Limit False

events:
  kind: Deployment
  replicaCount: 1
  rbac:
    create: true
    eventsAccess: true
  config:
    service: |
      [SERVICE]
          Daemon Off
          Flush 5
          Log_Level info
          HTTP_Server On
          HTTP_Listen 0.0.0.0
          HTTP_Port 2020
          Health_Check On
    inputs: |
      [INPUT]
          Name kubernetes_events
          Tag k8s_events
          Kube_URL https://kubernetes.default.svc
    filters: ""
    outputs: |
      [OUTPUT]
          Name es
          Match k8s_events
          Host dreamgames-es-master.elasticsearch.svc.cluster.local
          Port 9200
          Logstash_Format On
          Logstash_Prefix k8s-events
          Suppress_Type_Name On
          Replace_Dots On
          Retry_Limit False

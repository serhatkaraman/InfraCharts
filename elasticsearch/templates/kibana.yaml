apiVersion: kibana.k8s.elastic.co/v1
kind: Kibana
metadata:
  name: {{ .Values.kibanaName }}
  namespace: {{ .Release.Namespace }}
spec:
  version: {{ .Values.version }}
  count: 1
  elasticsearchRef:
    name: {{ .Values.esName }}
  http:
    tls:
      selfSignedCertificate:
        disabled: true
  podTemplate:
    spec:
      containers:
        - name: kibana
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi

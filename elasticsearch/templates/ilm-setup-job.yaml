{{- if .Values.ilm.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.esName }}-ilm-setup
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 20
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: ilm-setup
          image: curlimages/curl:8.11.1
          env:
            - name: ES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.esName }}-es-elastic-user
                  key: elastic
          command:
            - sh
            - -c
            - |
              set -eu
              ES="https://{{ .Values.esName }}-es-http:9200"
              until curl -sf -k -u "elastic:$ES_PASSWORD" "$ES/_cluster/health" >/dev/null 2>&1; do
                echo "waiting for elasticsearch..."
                sleep 5
              done
              curl -sf -k -u "elastic:$ES_PASSWORD" -X PUT "$ES/_ilm/policy/app-logs-policy" \
                -H 'Content-Type: application/json' -d '{
                  "policy": {
                    "phases": {
                      "hot": {
                        "actions": {
                          "rollover": {
                            "max_primary_shard_size": "{{ .Values.ilm.rolloverMaxPrimaryShardSize }}",
                            "max_age": "{{ .Values.ilm.rolloverMaxAge }}"
                          }
                        }
                      },
                      "delete": {
                        "min_age": "{{ .Values.ilm.retention }}",
                        "actions": { "delete": {} }
                      }
                    }
                  }
                }'
              curl -sf -k -u "elastic:$ES_PASSWORD" -X PUT "$ES/_index_template/app-logs" \
                -H 'Content-Type: application/json' -d '{
                  "index_patterns": ["{{ .Values.ilm.dataStream }}"],
                  "data_stream": {},
                  "template": {
                    "settings": {
                      "index.lifecycle.name": "app-logs-policy",
                      "number_of_replicas": {{ .Values.ilm.numberOfReplicas }}
                    }
                  }
                }'
              echo "ILM policy + data stream template applied"
{{- end }}
